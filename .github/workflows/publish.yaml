name: Publish release

on:
  push:
    # Publish `v*` tags as releases.
    tags:
      - v[0-9]+.[0-9]+.[0-9]+           # Releases
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+  # Release Candidates

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-github-prerelease:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref_name, 'rc')
    permissions:
      contents: write

    steps:
      - name: Create release candidate
        id: create_release_candidate
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # 1 Dec 2025, v2.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_name: Release Candidate ${{ github.ref_name }}
          draft: true           # So we can write release notes
          prerelease: true
          generate_release_notes: true

  create-github-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !contains(github.ref_name, 'rc')
    permissions:
      contents: write

    steps:
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # 1 Dec 2025, v2.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          draft: true           # So we can write release notes
          prerelease: false
          generate_release_notes: true

  build-and-publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc  # 7 Jun 2023, v2.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55  # 27 Aug 2023, v2.10.0

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # 27 Nov 2025, v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@0a97817b6ade9f46837855d676c4cca3a2471fc9  # 8 Sep 2023, v4.2.1
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
