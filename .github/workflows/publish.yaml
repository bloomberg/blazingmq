name: Publish release

on:
  push:
    # Publish `v*` tags as releases.
    tags:
      - v[0-9]+.[0-9]+.[0-9]+           # Releases
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+  # Release Candidates

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-github-prerelease:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref_name, 'rc')
    permissions:
      contents: write

    steps:
      - name: Create release candidate
        id: create_release_candidate
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # 19 Jun 2026, v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_name: Release Candidate ${{ github.ref_name }}
          draft: true           # So we can write release notes
          prerelease: true
          generate_release_notes: true

  create-github-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !contains(github.ref_name, 'rc')
    permissions:
      contents: write

    steps:
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # 19 Jun 2026, v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          draft: true           # So we can write release notes
          prerelease: false
          generate_release_notes: true

  build-and-publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # 22 May 2026, v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # 22 May 2026, v4.1.0

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # 22 May 2026, v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # 21 May 2026, v7.2.0
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
