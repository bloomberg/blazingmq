name: Nightly Fuzz Tests

on:
  schedule:
    - cron: "17 5 * * *"

  workflow_dispatch:

jobs:
  build:
    name: "Build broker for fuzzing"
    uses: ./.github/workflows/build-ubuntu.yaml
    with:
      ref: ${{ github.sha }}
      target: "bmqbrkr"
      save_build_as_artifacts: true
      run_unit_tests: false
      name: "fuzz-build"
      cxx_standard: cpp23

  fuzz_tests:
    name: "Fuzz [${{ matrix.request }}]"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - request: authentication
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[authentication]'"
          - request: negotiation
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[negotiation]'"
          - request: open_queue
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[open_queue]'"
          - request: configure_stream
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[configure_stream]'"
          - request: configure_queue_stream
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[configure_queue_stream]'"
          - request: put
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[put]'"
          - request: confirm
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[confirm]'"
          - request: close_queue
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[close_queue]'"
          - request: disconnect
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[disconnect]'"
          - request: negotiation_bypass_authentication
            pytest_target: "test_fuzz.py -k 'test_fuzz_request[negotiation_bypass_authentication]'"
          - request: put_message_properties
            pytest_target: "test_fuzz_put_message_properties.py -k 'test_fuzz_put_message_properties'"
    steps:
      - uses: actions/checkout@v6

      - name: Download broker build
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build.outputs.artifact_key }}

      - name: Prepare broker runtime files
        run: |
          BROKER_DIR=build/blazingmq/src/applications/bmqbrkr
          find ./build -type f -name "*.tsk" -exec chmod +x {} +
          cp src/applications/bmqbrkr/run "$BROKER_DIR/run"
          chmod +x "$BROKER_DIR/run"
          rm -rf "$BROKER_DIR/etc"
          cp -r src/applications/bmqbrkr/etc "$BROKER_DIR/etc"

      - name: Install Python dependencies
        run: pip install -r src/python/requirements-test.txt

      - name: Run fuzz test
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
          BLAZINGMQ_BUILD_DIR: ${{ github.workspace }}/build/blazingmq
        run: |
          pytest src/fuzz-tests/${{ matrix.pytest_target }} \
            -m fuzztest \
            -v \
            --timeout=3600

      - name: Upload fuzz logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-logs-${{ matrix.request }}
          path: |
            src/fuzz-tests/boofuzz-results/
            build/blazingmq/src/applications/bmqbrkr/localBMQ/logs/
